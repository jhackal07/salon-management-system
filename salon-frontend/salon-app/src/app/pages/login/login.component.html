<div class="page login-page">
  <section class="section">
    <h1 class="page-title">Login</h1>
    <p class="section-desc">Sign in with your account.</p>
    <form class="login-form" (ngSubmit)="submit()">
      <div class="form-row">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="your@email.com" required />
      </div>
      <div class="form-row">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required />
      </div>
      @if (error) {
        <p class="form-error">{{ error }}</p>
      }
      <button type="submit" class="btn btn-accent" [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
    <p class="form-note">No account? <a routerLink="/register">Create one</a> or <a routerLink="/book">book as a guest</a>.</p>
  </section>
</div>
